<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskyfy — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-wrapper">

    <div class="auth-card">

      <div class="auth-brand">
        <span class="brand-icon">✅</span>
        <h1 class="brand-name">Taskyfy</h1>
      </div>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Log in to see your tasks</p>

      <!-- server-side error message box -->
      <div class="alert alert-error hidden" id="loginAlert"></div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="field-error" id="emailErr"></span>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="loginPassword"
              placeholder="Your password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" data-target="loginPassword" title="Show/hide password">
              👁
            </button>
          </div>
          <span class="field-error" id="pwErr"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span id="loginBtnText">Log In</span>
        </button>

      </form>

      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>

    </div>

    <button class="theme-btn auth-theme-btn" id="themeToggleBtn" title="Toggle dark mode">🌙</button>

  </div>

  <script src="auth.js"></script>
</body>
</html>
